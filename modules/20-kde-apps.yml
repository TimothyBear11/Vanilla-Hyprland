name: kde-apps-apt
type: apt
sources:
  - packages:
    # File manager and archiver
    - dolphin
    - ark
    # Terminal emulators
    - kitty
    - konsole
    # Text editor and document viewer
    - kate
    - okular
    # Device integration
    - kdeconnect
    # Display manager
    - sddm
    - sddm-theme-breeze
    # Qt6 platform support (needed for KDE apps under Hyprland)
    - qt6ct
    - qt6-qpa-plugins
    - libqt6svg6
    # KDE framework integration
    - kde-cli-tools
    - breeze
    - breeze-cursor-theme
    # Thumbnail support for Dolphin
    - kde-spectacle
    - kimageformat-plugins
    - qt6-image-formats-plugins
    # Trash/file operations support
    - kio
    - kio-extras
    # Polkit KDE agent (for KDE apps needing privilege elevation)
    - polkit-kde-agent-1
