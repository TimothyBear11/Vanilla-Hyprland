name: audio-network-shell
type: shell
commands:
  - apt-get update
  - >-
    apt-get install -y --no-install-recommends
    pipewire
    pipewire-alsa
    pipewire-audio
    pipewire-pulse
    pipewire-jack
    wireplumber
    pavucontrol
    libspa-0.2-bluetooth
    network-manager
    network-manager-gnome
    gnome-keyring
    libsecret-1-0
    libsecret-tools
    polkitd pkexec
  - apt-get clean
  - rm -rf /var/lib/apt/lists/*
