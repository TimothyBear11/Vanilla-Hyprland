name: flatpak-setup
type: shell
commands:
  # Install Flatpak and Discover with the Flatpak backend
  - apt-get update
  - >-
    apt-get install -y --no-install-recommends
    flatpak
    plasma-discover
    plasma-discover-backend-flatpak

  # Add Flathub remote system-wide (available to all users)
  - >-
    flatpak remote-add --if-not-exists --system flathub
    https://dl.flathub.org/repo/flathub.flatpakrepo

  # Ensure the Flathub repo is enabled
  - flatpak remote-modify --system --enable flathub || true
