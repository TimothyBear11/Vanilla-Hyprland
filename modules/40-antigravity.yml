name: antigravity
type: shell
commands:
  - install -d -m 0755 /etc/apt/keyrings

  # Import Antigravity repo key (ASCII-armored) and store it as a dearmored keyring
  - curl -fsSL https://antigravity-repo.github.io/antigravity-repo-key.gpg | gpg --dearmor -o /etc/apt/keyrings/antigravity-repo-key.gpg
  - chmod 0644 /etc/apt/keyrings/antigravity-repo-key.gpg

  # Add Antigravity repo (Debian sid)
  - |
    cat > /etc/apt/sources.list.d/antigravity.list << 'EOF'
    deb [signed-by=/etc/apt/keyrings/antigravity-repo-key.gpg] https://antigravity-repo.github.io/ sid main
    EOF

  - apt-get update
  - apt-get install -y --no-install-recommends antigravity
  - apt-get clean
  - rm -rf /var/lib/apt/lists/*
