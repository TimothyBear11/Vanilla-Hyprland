name: core-packages-shell
type: shell
commands:
  - apt-get update
  - >-
    apt-get install -y --no-install-recommends
    hyprland xdg-desktop-portal xdg-desktop-portal-hyprland xdg-desktop-portal-gtk xdg-utils
    wl-clipboard cliphist grim swappy wlsunset
    cava ddcutil brightnessctl playerctl
    fish fastfetch git neovim nano
    dbus-user-session dbus-x11
    fonts-noto fonts-noto-color-emoji fonts-font-awesome
    qml6-module-qtquick-effects qml6-module-qtquick-shapes qml6-module-qtquick-controls qml6-module-qtquick-layouts
    bash-completion sudo systemd systemd-sysv
    ca-certificates curl wget tar unzip zip less htop man-db
  - apt-get clean
  - rm -rf /var/lib/apt/lists/*
