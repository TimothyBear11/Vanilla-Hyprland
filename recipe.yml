name: TBears Debian Hyprland
id: tbearvanilla
vibversion: 1.0.7

stages:
- id: build
  base: debian:sid-slim
  addincludes: true
  singlelayer: false
  labels:
    maintainer: TBear
  args:
    DEBIAN_FRONTEND: noninteractive

  # Disable recommends by default; each module installs only what is needed
  runs:
    commands:
      - echo 'APT::Install-Recommends "0";' > /etc/apt/apt.conf.d/01norecommends

  modules:
  - name: init-setup
    type: shell
    commands:
    - lpkg --unlock || true
    - apt-get update
    - apt-get install -y curl ca-certificates gnupg git wget
    - apt-get clean
    - rm -rf /var/lib/apt/lists/*

  - name: core-packages
    type: includes
    includes:
      - modules/10-core-packages.yml

  - name: kde-apps
    type: includes
    includes:
      - modules/20-kde-apps.yml

  - name: audio-network
    type: includes
    includes:
      - modules/30-audio-network.yml

  - name: noctalia
    type: includes
    includes:
      - modules/40-noctalia.yml

  - name: antigravity
    type: includes
    includes:
      - modules/50-antigravity.yml

  - name: flatpak-setup
    type: includes
    includes:
      - modules/60-flatpak.yml

  - name: flatpak-flathub
    type: includes
    includes:
      - modules/30-flatpak-flathub.yml
      
  - name: wallpapers
    type: includes
    includes:
      - modules/70-wallpapers.yml

  - name: sddm-config
    type: includes
    includes:
      - modules/75-sddm-config.yml

  - name: set-image-name-abroot
    type: includes
    includes:
      - modules/80-set-image-abroot-config.yml

  - name: cleanup
    type: shell
    commands:
    - apt-get autoremove -y
    - apt-get clean
    - lpkg --lock || true

  - name: fsguard
    type: fsguard
    CustomFsGuard: false
    FsGuardLocation: "/usr/sbin/FsGuard"
    GenerateKey: true
    FilelistPaths: ["/usr/bin"]
    modules:
      - name: remove-prev-fsguard
        type: shell
        commands:
          - rm -rf /FsGuard
          - rm -f ./minisign.pub ./minisign.key
          - chmod +x /usr/sbin/init

  - name: cleanup2
    type: shell
    commands:
      - rm -rf /tmp/*
      - rm -rf /var/tmp/*
